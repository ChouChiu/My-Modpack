name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Give Permissiom
        run: chmod +x srdk

      - name: Build mrpack
        run: ./srdk build

      - name: Build offline mrpack
        run: ./srdk build_offline

      - uses: actions/upload-artifact@v7
        with:
          name: modpack
          path: build/*.mrpack
          if-no-files-found: error