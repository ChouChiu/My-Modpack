name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Give Permissiom
        run: chmod +x srdk

      - name: Build mrpack
        run: ./srdk build

      - name: Build offline mrpack
        run: ./srdk build_offline

      - uses: softprops/action-gh-release@v2
        with:
          files: build/*.mrpack
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}